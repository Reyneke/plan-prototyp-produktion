name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: >
          flutter build web --release --base-href=/plan-prototyp-produktion/
          --dart-define=SUPABASE_URL=https://nsjvwjtbijyqdhvvjvfo.supabase.co
          --dart-define=SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zanZ3anRiaWp5cWRodnZqdmZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1ODg2NzIsImV4cCI6MjA5OTE2NDY3Mn0.DDEnBCRDdc5aNlh30AAOGyUw5C85K2y-940ablzRzVY

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4