name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create env files from secrets
        run: |
          mkdir -p lib/env
          echo "const String url = '${{ secrets.SUPABASE_URL }}';" > lib/env/supabase_key.dart
          echo "const String anonKey = '${{ secrets.SUPABASE_ANON_KEY }}';" >> lib/env/supabase_key.dart
          echo "const String brevoApiKey = '${{ secrets.BREVO_API_KEY }}';" > lib/env/api_key.dart

      - name: Verify env files
        run: cat lib/env/supabase_key.dart

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter build web --release --base-href=/plan-prototyp-produktion/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4